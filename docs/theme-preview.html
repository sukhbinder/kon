<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kon Theme Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.5;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #theme-bar {
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid;
    flex-shrink: 0;
  }
  #theme-bar label { font-weight: 600; }
  #theme-bar select {
    font-family: inherit;
    font-size: 13px;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid;
    background: transparent;
  }

  #terminal {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #chat-log {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px 8px 16px;
  }

  .session-info {
    padding: 8px 0 10px 0;
  }
  .session-info .app-name { font-weight: 700; }
  .shortcut-line { line-height: 1.45; }

  .loaded-resources {
    padding: 4px 0 8px 0;
  }
  .resource-heading { font-weight: 600; }
  .resource-entry { white-space: pre; }

  .boxed-msg {
    margin-top: 8px;
    padding: 4px 8px;
    border-radius: 3px;
  }
  .boxed-label { font-weight: 700; margin-right: 6px; }

  .thinking-block {
    margin-top: 8px;
    font-style: italic;
  }

  .content-block {
    margin-top: 8px;
  }
  .content-block p { margin-bottom: 6px; }
  .content-block code {
    padding: 0;
    border-radius: 0;
    font-size: 12px;
  }

  .tool-lines {
    margin-top: 8px;
  }
  .tool-line {
    white-space: pre-wrap;
    word-break: break-word;
  }
  .tool-name {
    font-weight: 400;
  }
  .tool-output-inline {
    margin-left: 1ch;
  }
  .tool-output-block {
    margin-left: 2ch;
  }
  .tool-output-line {
    white-space: pre-wrap;
    word-break: break-word;
  }
  .approval-line {
    margin-left: 2ch;
    color: inherit;
    white-space: pre-wrap;
  }
  .approval-key {
    font-weight: 700;
  }

  #status-line {
    padding: 4px 16px;
    flex-shrink: 0;
  }

  #input-area {
    padding: 8px 16px 4px 16px;
    flex-shrink: 0;
    border-top: 1px solid;
    border-bottom: 1px solid;
  }
  #input-area textarea {
    width: 100%;
    height: 20px;
    font-family: inherit;
    font-size: 13px;
    border: none;
    outline: none;
    resize: none;
    padding: 0;
    line-height: 20px;
  }
  #input-area textarea::placeholder {
    opacity: 0.45;
  }

  #info-bar {
    flex-shrink: 0;
    padding: 0 16px;
    font-size: 12px;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    padding: 1px 0;
  }
</style>
</head>
<body>

<div id="theme-bar">
  <label for="theme-select">Theme:</label>
  <select id="theme-select">
    <option value="gruvbox-dark">Gruvbox Dark</option>
    <option value="gruvbox-light">Gruvbox Light</option>
    <option value="catppuccin-mocha">Catppuccin Mocha</option>
    <option value="catppuccin-latte">Catppuccin Latte</option>
    <option value="tokyo-night">Tokyo Night</option>
    <option value="tokyo-day">Tokyo Day</option>
    <option value="one-dark">One Dark</option>
    <option value="one-light">One Light</option>
  </select>
</div>

<div id="terminal">
  <div id="chat-log"></div>

  <div id="status-line"></div>

  <div id="input-area">
    <textarea rows="1" placeholder="Send a message..." spellcheck="false"></textarea>
  </div>

  <div id="info-bar">
    <div class="info-row">
      <span id="bar-cwd"></span>
      <span id="bar-tokens"></span>
    </div>
    <div class="info-row">
      <span id="bar-files"></span>
      <span id="bar-model"></span>
    </div>
  </div>
</div>

function applyTheme(name) {
  const t = THEMES[name];
  if (!t) return;

  const body = document.body;
  const term = document.getElementById('terminal');
  const bar = document.getElementById('theme-bar');
  const select = document.querySelector('#theme-bar select');
  const input = document.getElementById('input-area');
  const ta = document.querySelector('#input-area textarea');

  body.style.background = t.bg;
  body.style.color = t.fg;
  term.style.background = t.bg;

  bar.style.background = t.bg;
  bar.style.borderColor = t.border;
  bar.style.color = t.dim;
  select.style.color = t.fg;
  select.style.borderColor = t.border;

  input.style.borderColor = t.border;
  ta.style.background = 'transparent';
  ta.style.color = t.fg;

  document.getElementById('info-bar').style.color = t.muted;
  document.getElementById('status-line').style.color = t.muted;

  renderChat(t);
}

function renderChat(t) {
  const log = document.getElementById('chat-log');
  log.innerHTML = '';

  log.innerHTML += `
    <div class="session-info">
      <span class="app-name" style="color:${t.accent}">kon</span>
      <span class="version" style="color:${t.dim}"> v0.4.2</span>
      <div class="shortcut-line"><span style="color:${t.dim}">escape</span><span style="color:${t.muted}"> to interrupt</span></div>
      <div class="shortcut-line"><span style="color:${t.dim}">ctrl+c</span><span style="color:${t.muted}"> to clear input</span></div>
      <div class="shortcut-line"><span style="color:${t.dim}">/</span><span style="color:${t.muted}"> for commands</span></div>
      <div class="shortcut-line"><span style="color:${t.dim}">@</span><span style="color:${t.muted}"> to search files</span></div>
      <div class="shortcut-line"><span style="color:${t.dim}">shift+tab</span><span style="color:${t.muted}"> cycle thinking</span></div>
    </div>`;

  log.innerHTML += `
    <div class="loaded-resources">
      <div><span class="resource-heading" style="color:${t.notice}">[Context]</span></div>
      <div><span class="resource-entry" style="color:${t.dim}">  AGENTS.md</span></div>
      <div><span class="resource-entry" style="color:${t.dim}">  src/kon/.kon/AGENTS.md</span></div>
      <div style="margin-top:4px"><span class="resource-heading" style="color:${t.notice}">[Skills]</span></div>
      <div><span class="resource-entry" style="color:${t.dim}">  kon-release-publish</span></div>
      <div><span class="resource-entry" style="color:${t.dim}">  kon-tmux-test</span></div>
    </div>`;

  log.innerHTML += boxedMsg(t, 'user', '', 'review the core loop and fix any bugs you find');

  log.innerHTML += `
    <div class="thinking-block" style="color:${t.dim}">
      Let me look at the core loop implementation to understand the flow and identify potential issues...
    </div>`;

  log.innerHTML += `
    <div class="content-block" style="color:${t.fg}">
      <p>I'll start by reading the core files to understand the architecture.</p>
    </div>`;

  log.innerHTML += `<div class="tool-lines">
    ${mkToolLine(t, {
      name: 'Read',
      params: [{ key: 'path', value: 'src/kon/loop.py' }],
      output: '287 lines'
    })}
    ${mkToolLine(t, {
      name: 'Read',
      params: [{ key: 'path', value: 'src/kon/turn.py' }],
      output: '580 lines'
    })}
    ${mkToolLine(t, {
      name: 'Edit',
      params: [{ key: 'path', value: 'src/kon/loop.py' }],
      output: `<span style="color:${t.diff_added}">+3</span> <span style="color:${t.diff_removed}">-1</span>`
    })}
    ${mkToolLine(t, {
      name: 'Bash',
      params: [{ key: 'command', value: 'uv run pyright .' }],
      state: 'failed',
      output: [
        'src/kon/loop.py:45 Argument missing',
        'src/kon/turn.py:112 Incompatible types',
        'src/kon/core/compaction.py:30 Missing return',
        '(14 more lines)'
      ]
    })}
    ${mkToolLine(t, {
      name: 'Write',
      params: [{ key: 'path', value: 'src/kon/core/utils.py' }],
      state: 'running'
    })}
    ${mkApprovalLine(t)}
  </div>`;

  log.innerHTML += boxedMsg(t, 'info', 'handoff', 'Continuing from previous agent summary: compaction branch and pyright fixes pending');

  log.innerHTML += `
    <div class="content-block" style="color:${t.fg}">
      <p>Found <span style="color:${t.md_heading}">3 issues</span> in the compaction logic.
         The <code style="color:${t.md_code}">is_overflow</code> function
         double-counts cache tokens, and the summarization call sends the full
         history even when it already exceeds the context window.</p>
      <p>I've applied fixes to <code style="color:${t.md_code}">loop.py</code>
         and <code style="color:${t.md_code}">compaction.py</code>.</p>
    </div>`;

  log.innerHTML += boxedMsg(t, 'info', 'compaction', 'Compacted from 184,200 tokens');

  document.getElementById('status-line').innerHTML = `<span style="color:${t.muted}">12s · 8x</span>`;

  document.getElementById('bar-cwd').innerHTML =
    `<span>~/Work/kon (⌥ main)</span>`;
  document.getElementById('bar-tokens').innerHTML =
    `<span>142k/200k · ↑128k ↓14k R96k</span>`;
  document.getElementById('bar-files').innerHTML =
    `<span>3 files +48 -5</span>`;
  document.getElementById('bar-model').innerHTML =
    `<span>claude-sonnet-4-20250514 · medium</span>`;
}

function boxedMsg(t, kind, label, text) {
  const themes = {
    user: { bg: t.panel_user, label: t.accent, text: t.fg },
    info: { bg: t.panel, label: '#d3869b', text: t.dim },
  };

  if (kind === 'user') {
    const c = themes.user;
    return `<div class="boxed-msg" style="background:${c.bg};color:${c.text}">${text}</div>`;
  }

  const c = themes.info;
  return `<div class="boxed-msg" style="background:${c.bg};color:${c.text}"><span class="boxed-label" style="color:${c.label}">[${label}]</span>${text}</div>`;
}

function mkToolLine(t, { name, params = [], output = '', state = 'success' }) {
  const toolColor = state === 'failed' ? t.failed : state === 'running' ? t.running : t.dim;
  const dotColor = state === 'failed' ? t.failed : state === 'running' ? t.running : state === 'success' ? t.success : t.dim;
  const paramsHtml = params
    .map(p => `<span style="color:${t.muted}">${p.value}</span>`)
    .join(' ');

  const outputLines = Array.isArray(output) ? output : output ? [output] : [];
  let outputHtml = '';

  if (outputLines.length === 1) {
    outputHtml = `<span class="tool-output-inline" style="color:${t.dim}">${outputLines[0]}</span>`;
  }

  if (outputLines.length > 1) {
    const linesHtml = outputLines
      .map((line, idx) => {
        const prefix = idx === 0 ? '└ ' : '  ';
        return `<div class="tool-output-line" style="color:${t.dim}">${prefix}${line}</div>`;
      })
      .join('');
    outputHtml = `<div class="tool-output-block">${linesHtml}</div>`;
  }

  return `<div class="tool-line"><span style="color:${dotColor}">·</span> <span class="tool-name" style="color:${toolColor}">${name}</span> ${paramsHtml}${outputHtml}</div>`;
}

function mkApprovalLine(t) {
  return `<div class="approval-line" style="color:${t.dim}"><span class="approval-key" style="color:${t.accent}">[y]</span> approve  <span class="approval-key" style="color:${t.accent}">[n]</span> deny</div>`;
}

document.getElementById('theme-select').addEventListener('change', e => {
  applyTheme(e.target.value);
});
applyTheme('gruvbox-dark');
